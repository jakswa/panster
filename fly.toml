# fly.toml app configuration file generated for panster-party on 2026-07-21T22:42:39-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'panster-party'
primary_region = 'iad'

[build]
[env]
  PUBLIC_ORIGIN = 'https://panster-party.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
